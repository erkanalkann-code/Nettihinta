<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
font-family:-apple-system;
margin:0;
background:white;
color:black;
}

.header{
padding:16px;
font-size:22px;
font-weight:700;
}

.sell{
margin:16px;
background:black;
color:white;
padding:18px;
border-radius:14px;
text-align:center;
font-weight:600;
}

.categories{
display:flex;
gap:8px;
padding:0 16px;
overflow:auto;
}

.cat{
border:1px solid #ddd;
padding:8px 14px;
border-radius:20px;
font-size:14px;
white-space:nowrap;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
padding:16px;
}

.card img{
width:100%;
border-radius:12px;
}

.price{
font-weight:700;
margin-top:4px;
}

.nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
border-top:1px solid #eee;
display:flex;
justify-content:space-around;
padding:12px 0;
}

.nav div{
font-size:12px;
}
</style>
</head>

<body>

<div class="header">
Nettihinta
</div>

<div class="sell" onclick="location.href='sell.html'">
Foto çek ve sat
</div>

<div class="categories">
<div class="cat">Giyim</div>
<div class="cat">Ayakkabı</div>
<div class="cat">Çanta</div>
<div class="cat">Aksesuar</div>
</div>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1520975916090-3105956dac38?w=400">
<div>Zara Mont</div>
<div class="price">18€</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400">
<div>Nike Ayakkabı</div>
<div class="price">22€</div>
</div>

</div>

<div class="nav">
<div>Anasayfa</div>
<div onclick="location.href='sell.html'">Sat</div>
<div>Sepet</div>
<div>Profil</div>
</div>

</body>
</html>
