<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nettihinta</title>

<style>
body{
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial,sans-serif;
background:#f5f5f5;
margin:0;
}

.header{
background:white;
padding:16px;
font-weight:800;
font-size:22px;
display:flex;
align-items:center;
gap:10px;
}

.circle{
width:34px;
height:34px;
background:black;
color:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:900;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
padding:12px;
}

.card{
background:white;
border-radius:14px;
overflow:hidden;
}

.img{
height:140px;
background:#ddd;
}

.content{
padding:10px;
}

.price{
font-weight:800;
font-size:16px;
}

.title{
font-size:13px;
color:#555;
margin-top:3px;
}

.bottom{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
display:flex;
justify-content:space-around;
padding:14px;
border-top:1px solid #eee;
}

.nav{
font-size:12px;
text-align:center;
}
</style>

</head>
<body>

<div class="header">
<div class="circle">N</div>
Nettihinta
</div>

<div class="grid">

<div class="card">
<div class="img"></div>
<div class="content">
<div class="price">12€</div>
<div class="title">Nike huppari</div>
</div>
</div>

<div class="card">
<div class="img"></div>
<div class="content">
<div class="price">8€</div>
<div class="title">IKEA lamppu</div>
</div>
</div>

<div class="card">
<div class="img"></div>
<div class="content">
<div class="price">15€</div>
<div class="title">Adidas kengät</div>
</div>
</div>

<div class="card">
<div class="img"></div>
<div class="content">
<div class="price">5€</div>
<div class="title">Kirja paketti</div>
</div>
</div>

</div>

<div class="bottom">
<div class="nav">Koti</div>
<div class="nav">Haku</div>
<div class="nav">Myy</div>
<div class="nav">Ostoskori</div>
<div class="nav">Profiili</div>
</div>

</body>
</html>
