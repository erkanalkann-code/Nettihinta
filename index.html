<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nettihinta</title>

<style>
body{
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
margin:0;
background:#f5f5f5;
}

.header{
padding:20px;
font-size:28px;
font-weight:700;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
padding:12px;
}

.card{
background:white;
border-radius:14px;
overflow:hidden;
position:relative;
}

.discount{
position:absolute;
top:8px;
left:8px;
background:red;
color:white;
padding:4px 8px;
border-radius:8px;
font-weight:700;
}

.card img{
width:100%;
}

.info{
padding:10px;
}

.price{
font-weight:700;
}

.old{
text-decoration:line-through;
color:#888;
margin-left:6px;
}

.btn{
margin-top:8px;
background:black;
color:white;
padding:8px;
border-radius:8px;
text-align:center;
}
</style>
</head>

<body>

<div class="header">Nettihinta</div>

<div class="grid" id="deals"></div>

<script>

const deals = [
{
title:"AirPods Pro",
store:"Gigantti",
oldPrice:299,
newPrice:199,
discount:33,
image:"https://images.unsplash.com/photo-1580910051074-3eb694886505",
link:"#"
},
{
title:"iPhone 15",
store:"Verkkokauppa",
oldPrice:999,
newPrice:799,
discount:20,
image:"https://images.unsplash.com/photo-1511707171634-5f897ff02aa9",
link:"#"
}
]

const container = document.getElementById("deals")

deals
.sort((a,b)=> b.discount-a.discount)
.forEach(deal=>{

container.innerHTML += `
<div class="card">
<div class="discount">-${deal.discount}%</div>
<img src="${deal.image}">
<div class="info">

<div>${deal.title}</div>

<div class="price">
${deal.newPrice}€
<span class="old">${deal.oldPrice}€</span>
</div>

<div>${deal.store}</div>

<a href="${deal.link}" target="_blank">
<div class="btn">Siirry kauppaan</div>
</a>

</div>
</div>
`

})

</script>

</body>
</html>
