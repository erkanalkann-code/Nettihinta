<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nettihinta</title>

<style>
body{
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial,sans-serif;
background:white;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:100%;
max-width:420px;
padding:24px;
}

/* logo */
.logo{
display:flex;
align-items:center;
gap:12px;
font-size:28px;
font-weight:800;
margin-bottom:40px;
}

.circle{
width:42px;
height:42px;
background:black;
color:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:900;
}

/* buttons */
.btn{
width:100%;
background:black;
color:white;
padding:16px;
border-radius:14px;
text-align:center;
font-weight:600;
margin-bottom:12px;
}

.btn.light{
background:#f3f3f3;
color:black;
}

.terms{
margin-top:20px;
font-size:12px;
color:#888;
text-align:center;
}
</style>

</head>
<body>

<div class="container">

<div class="logo">
<div class="circle">N</div>
Nettihinta
</div>

<div class="btn">Google ile giriş yap</div>
<div class="btn">Apple ile giriş yap</div>
<div class="btn light">Sähköposti ile devam et</div>

<div class="terms">
Jatkamalla hyväksyt käyttöehdot
</div>

</div>

</body>
</html>
