
<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nettihinta</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">Nettihinta</div>
  <div class="header">
<h1>Nettihinta</h1>
<p class="subtitle">
Haluatko nähdä Suomen kaikki alennukset yhdessä paikassa?
</p>
<p class="subtext">
Seuraamme tarjouksia puolestasi.
</p>
</div>
  
<div class="filters">
<button onclick="setActive(this);showAll()">🔥 Kaikki</button>
<button onclick="setActive(this);showNew()">⚡ Uusimmat</button>
<button onclick="setActive(this);showBig()">📉 Suurimmat</button>
<button onclick="setActive(this);showCategory('Elektroniikka')">📱 Elektroniikka</button>
<button onclick="setActive(this);showStore('Gigantti')">Gigantti</button>
<button onclick="setActive(this);showStore('Power')">Power</button>
<button onclick="setActive(this);showStore('Verkkokauppa')">Verkkokauppa</button>
</div>
<div class="grid" id="deals"></div>

<script src="deals.js"></script>
<script src="app.js"></script>
.header h1{
font-size:32px;
margin-bottom:6px;
}

.subtitle{
font-size:16px;
font-weight:600;
}

.subtext{
font-size:14px;
font-weight:400;
}
</body>
</html>
