<!DOCTYPE html>
<html lang="fi">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:-apple-system, Arial;
margin:0;
background:white;
color:black;
}

.header{
padding:16px;
font-size:22px;
font-weight:700;
}

.sell{
margin:16px;
background:black;
color:white;
padding:18px;
border-radius:14px;
text-align:center;
font-weight:600;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:16px;
padding-bottom:90px;
}

.card img{
width:100%;
border-radius:12px;
}

.title{
margin-top:6px;
font-size:14px;
}

.price{
font-weight:700;
font-size:14px;
}

.nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
border-top:1px solid #eee;
display:flex;
justify-content:space-around;
padding:12px 0;
}

.nav div{
font-size:12px;
}
</style>
</head>

<body>

<div class="header">
Nettihinta
</div>

<div class="sell">
Ota kuva ja myy
</div>

<div class="grid">

<div class="card" onclick="location.href='product.html'">
<img src="https://images.unsplash.com/photo-1520975916090-3105956dac38?w=400">
<div class="title">Takki</div>
<div class="price">18€</div>
</div>

<div class="card" onclick="location.href='product.html'">
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400">
<div class="title">Kengät</div>
<div class="price">22€</div>
</div>

<div class="card" onclick="location.href='product.html'">
<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=400">
<div class="title">T-paita</div>
<div class="price">9€</div>
</div>

<div class="card" onclick="location.href='product.html'">
<img src="https://images.unsplash.com/photo-1593032465171-8c15c39a7b5f?w=400">
<div class="title">Laukku</div>
<div class="price">14€</div>
</div>

</div>

<div class="nav">
<div>Etusivu</div>
<div>Myy</div>
<div>Kori</div>
<div>Profiili</div>
</div>

</body>
</html>
