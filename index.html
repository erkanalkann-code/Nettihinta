<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nettihinta</title>

<style>
body{
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial,sans-serif;
background:white;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

.container{
max-width:420px;
}

.circle{
width:60px;
height:60px;
border-radius:50%;
border:4px solid #eee;
border-top:4px solid black;
margin:auto;
margin-bottom:20px;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

.title{
font-size:22px;
font-weight:700;
margin-bottom:10px;
}

.text{
color:#666;
margin-bottom:6px;
}
</style>

</head>
<body>

<div class="container">

<div class="circle"></div>

<div class="title">
Analysoidaan...
</div>

<div class="text">Haetaan markkinahintoja</div>
<div class="text">Tarkistetaan kunto</div>
<div class="text">Lasketaan hinta</div>

</div>

</body>
</html>
