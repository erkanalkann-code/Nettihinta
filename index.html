<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nettihinta</title>

<style>
body{
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial,sans-serif;
background:#f5f5f5;
margin:0;
}

.header{
background:white;
padding:16px;
font-weight:800;
font-size:22px;
display:flex;
gap:10px;
align-items:center;
}

.circle{
width:34px;
height:34px;
background:black;
color:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}

.card{
background:white;
margin:12px;
padding:12px;
border-radius:12px;
display:flex;
gap:10px;
}

.img{
width:70px;
height:70px;
background:#ddd;
border-radius:8px;
}

.row{
display:flex;
justify-content:space-between;
margin:12px;
font-weight:600;
}

.total{
background:white;
margin:12px;
padding:16px;
border-radius:12px;
font-weight:800;
font-size:18px;
}

.btn{
position:fixed;
bottom:20px;
left:16px;
right:16px;
background:black;
color:white;
padding:18px;
border-radius:16px;
text-align:center;
font-weight:700;
}
</style>

</head>
<body>

<div class="header">
<div class="circle">N</div>
Ostoskori
</div>

<div class="card">
<div class="img"></div>
<div>
<div>Nike huppari</div>
<div>Myyjä: Mikko</div>
<div>10€</div>
</div>
</div>

<div class="card">
<div class="img"></div>
<div>
<div>Adidas housut</div>
<div>Myyjä: Mikko</div>
<div>8€</div>
</div>
</div>

<div class="card">
<div class="img"></div>
<div>
<div>Kirja</div>
<div>Myyjä: Laura</div>
<div>6€</div>
</div>
</div>

<div class="row">
<div>Tuotteet</div>
<div>24€</div>
</div>

<div class="row">
<div>Palvelumaksu</div>
<div>3€</div>
</div>

<div class="row">
<div>Toimitus</div>
<div>6.50€</div>
</div>

<div class="total">
Yhteensä: 33.50€
</div>

<div class="btn">
Maksa
</div>

</body>
</html>
