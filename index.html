<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nettihinta</title>

<style>
body{
font-family: -apple-system, BlinkMacSystemFont, sans-serif;
background:#ffffff;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
text-align:center;
max-width:500px;
width:90%;
}

h1{
font-size:32px;
margin-bottom:10px;
}

p{
color:#666;
margin-bottom:30px;
}

.upload{
border:2px dashed #ddd;
padding:40px;
border-radius:16px;
cursor:pointer;
transition:0.2s;
}

.upload:hover{
border-color:#000;
}

.result{
display:none;
margin-top:30px;
}

.price{
font-size:34px;
font-weight:bold;
margin:20px 0;
}

.buttons button{
display:block;
width:100%;
margin:8px 0;
padding:14px;
border:none;
border-radius:10px;
background:#f5f5f5;
font-size:16px;
}
</style>

</head>

<body>

<div class="container">

<h1>Selvitä tavarasi arvo sekunneissa</h1>
<p>Lataa kuva ja saat luotettavan markkinahinnan Suomessa</p>

<div class="upload" onclick="showResult()">
Lataa kuva
</div>

<div class="result" id="result">

<h2>iPhone 13 128GB</h2>

<div class="price">
420€ — 470€
</div>

<p>Analysoitu: 27 ilmoitusta<br>
Luotettavuus: 92%</p>

<div class="buttons">
<button>Myy Tori.fi</button>
<button>Myy Facebook Marketplace</button>
<button>Myy Huuto.net</button>
<button>Myy eBay</button>
</div>

</div>

</div>

<script>
function showResult(){
document.getElementById("result").style.display="block";
}
</script>

</body>
</html>
