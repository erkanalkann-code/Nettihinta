<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nettihinta</title>

<style>
body{
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial,sans-serif;
background:white;
margin:0;
padding:20px;
}

.container{
max-width:420px;
margin:auto;
}

.logo{
display:flex;
align-items:center;
gap:12px;
font-size:26px;
font-weight:800;
margin-bottom:20px;
}

.circle{
width:40px;
height:40px;
background:black;
color:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:900;
}

.upload{
height:160px;
border:2px dashed #ddd;
border-radius:16px;
display:flex;
align-items:center;
justify-content:center;
margin-bottom:16px;
color:#666;
}

.input{
width:100%;
padding:16px;
border-radius:12px;
border:1px solid #eee;
margin-bottom:12px;
font-size:16px;
}

.select{
width:100%;
padding:16px;
border-radius:12px;
border:1px solid #eee;
margin-bottom:12px;
font-size:16px;
}

.label{
font-weight:600;
margin-top:12px;
margin-bottom:6px;
}

.btn{
width:100%;
background:black;
color:white;
padding:18px;
border-radius:16px;
text-align:center;
font-weight:700;
margin-top:20px;
}
</style>

</head>
<body>

<div class="container">

<div class="logo">
<div class="circle">N</div>
Nettihinta
</div>

<div class="upload">
📷 Lataa kuva
</div>

<input class="input" placeholder="Tuotteen nimi">

<textarea class="input" placeholder="Kuvaus"></textarea>

<div class="label">Kozmetik kunto (AI arvio)</div>
<select class="select">
<option>Hyvä</option>
<option>Uusi</option>
<option>Ok</option>
</select>

<div class="label">Toimiiko normaalisti?</div>
<select class="select">
<option>Kyllä</option>
<option>Pieniä vikoja</option>
<option>Ei toimi kunnolla</option>
</select>

<div class="label">Akku kunto</div>
<select class="select">
<option>Hyvä</option>
<option>Heikko</option>
<option>En tiedä</option>
</select>

<div class="label">Kaikki mukana?</div>
<select class="select">
<option>Kyllä</option>
<option>Ei</option>
</select>

<div class="btn">
Analysoi hinta
</div>

</div>

</body>
</html>
