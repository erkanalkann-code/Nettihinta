<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
font-family: -apple-system, Arial;
background:#f5f5f5;
margin:0;
}

.card{
background:white;
margin:16px;
padding:16px;
border-radius:16px;
}

.row{
display:flex;
justify-content:space-between;
margin-top:8px;
}

.total{
font-weight:800;
font-size:20px;
margin-top:12px;
display:flex;
justify-content:space-between;
}
</style>
</head>

<body>

<div class="card">

<div class="row">
<div>Tuotteet</div>
<div>24€</div>
</div>

<div class="row">
<div>Palvelumaksu</div>
<div>3€</div>
</div>

<div class="row" style="font-weight:600;margin-top:12px;">
<div>Toimitus</div>
<div>6.50€</div>
</div>

<div style="color:#666;font-size:14px;margin-top:6px">

<div class="row">
<div>Mikko (2 tuotetta)</div>
<div>3.50€</div>
</div>

<div class="row">
<div>Laura (1 tuote)</div>
<div>3.00€</div>
</div>

</div>

<div class="total">
<div>Yhteensä</div>
<div>33.50€</div>
</div>

</div>

<div onclick="pay()" style="
position:fixed;
bottom:20px;
left:16px;
right:16px;
background:black;
color:white;
padding:18px;
border-radius:16px;
text-align:center;
font-weight:700;
font-size:16px;
">
Maksa
</div>

<script>
<script>
function pay(){

document.body.innerHTML = `
<div style="
font-family:-apple-system;
background:#f5f5f5;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
">

<div style="
background:white;
padding:30px;
border-radius:20px;
text-align:center;
width:80%;
max-width:400px;
">

<div style="font-size:18px;font-weight:600">
Maksu käsitellään...
</div>

</div>

</div>
`

setTimeout(()=>{
document.body.innerHTML = `
<div style="
font-family:-apple-system;
background:#f5f5f5;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
">

<div style="
background:white;
padding:30px;
border-radius:20px;
text-align:center;
width:80%;
max-width:400px;
">

<div style="font-size:22px;font-weight:700;margin-bottom:10px">
Maksu onnistui
</div>

<div style="color:#666">
Tilauksesi on vahvistettu
</div>
</div>
</div>
`
},1000)
}
