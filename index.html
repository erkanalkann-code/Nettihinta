<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
font-family: -apple-system, Arial;
background:#f5f5f5;

}

.card{
background:white;
margin:16px;

border-radius:16px;
}

.row{
display:flex;
justify-content:space-between;
margin-top:8px;
}

.total{

}
</style>
</head>

<body>

<div class="card">

<div class="row">

</div>

</div>

</div>

<div style="color:#666;font-size:14px;margin-top:6px">

</div>

</div>

</div>

<div class="total">

</div>

</div>

bottom:20px;

color:white;

text-align:center;

font-size:16px;

Maksa

<script>

document.body.innerHTML = `
<div style="
font-family:-apple-system;
background:#f5f5f5;
height:100vh;
display:flex;
align-items:center;

Maksetaan...
</div>

</div>
`

setTimeout(()=>{

document.body.innerHTML = `
<div style="
font-family:-apple-system;
background:#f5f5f5;
height:100vh;

align-items:center;
justify-content:center;
flex-direction:column;
">

<div style="
background:white;
padding:30px;
border-radius:20px;

<div style="font-size:24px;font-weight:700;margin-bottom:6px">
