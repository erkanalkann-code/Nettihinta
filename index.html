<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nettihinta</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#f5f5f5;
margin:0;
}

.header{
padding:20px;
font-size:28px;
font-weight:700;
}

.sub{
padding:0 20px;
color:#666;
}

.section{
padding:20px;
font-size:22px;
font-weight:700;
}

.card{
background:white;
margin:15px;
border-radius:16px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.card img{
width:100%;
}

.info{
padding:15px;
}

.store{
display:flex;
align-items:center;
gap:8px;
color:#666;
font-size:14px;
}

.store img{
width:20px;
height:20px;
}

.title{
font-size:18px;
font-weight:600;
margin-top:5px;
}

.price{
font-size:22px;
font-weight:700;
margin-top:6px;
}

.old{
text-decoration:line-through;
color:#999;
margin-left:8px;
}

.discount{
color:red;
margin-left:8px;
font-weight:700;
}

.btn{
margin-top:12px;
background:black;
color:white;
padding:12px;
border-radius:12px;
text-align:center;
font-weight:600;
}

.nav{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:14px 0;
border-top:1px solid #eee;
}

</style>
</head>

<body>

<div class="header">Nettihinta</div>
<div class="sub">Suomen parhaat tarjoukset yhdessä paikassa</div>

<div class="section">🔥 Päivän parhaat tarjoukset</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1580910051074-3eb694886505">
<div class="info">

<div class="store">
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Gigantti_logo.png">
Gigantti
</div>

<div class="title">AirPods Pro</div>

<div class="price">
199€
<span class="old">299€</span>
<span class="discount">-33%</span>
</div>

<div class="btn">Siirry kauppaan</div>

</div>
</div>


<div class="card">
<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">
<div class="info">

<div class="store">
<img src="https://upload.wikimedia.org/wikipedia/commons/0/0c/Verkkokauppa.com_logo.png">
Verkkokauppa
</div>

<div class="title">iPhone 15</div>

<div class="price">
799€
<span class="old">999€</span>
<span class="discount">-20%</span>
</div>

<div class="btn">Siirry kauppaan</div>

</div>
</div>


<div class="nav">
<div>Tarjoukset</div>
<div>Kategoriat</div>
<div>Suosikit</div>
<div>Profiili</div>
</div>

</body>
</html>
