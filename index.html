<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nettihinta</title>

<style>
body{
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial,sans-serif;
background:white;
margin:0;
}

.header{
display:flex;
align-items:center;
gap:10px;
padding:16px;
font-weight:800;
font-size:22px;
border-bottom:1px solid #eee;
}

.circle{
width:34px;
height:34px;
background:black;
color:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:900;
}

.img{
height:300px;
background:#ddd;
}

.content{
padding:16px;
}

.price{
font-size:26px;
font-weight:800;
margin-bottom:5px;
}

.title{
font-size:18px;
font-weight:600;
margin-bottom:10px;
}

.desc{
color:#666;
margin-bottom:20px;
}

.btn{
position:fixed;
bottom:20px;
left:16px;
right:16px;
background:black;
color:white;
padding:18px;
border-radius:16px;
text-align:center;
font-weight:700;
}
</style>

</head>
<body>

<div class="header">
<div class="circle">N</div>
Nettihinta
</div>

<div class="img"></div>

<div class="content">
<div class="price">12€</div>
<div class="title">Nike huppari</div>
<div class="desc">
Hyvä kuntoinen Nike huppari. Koko M. Ei reikiä tai tahroja.
</div>

<div>Kunto: Hyvä</div>
<div>Myyjä: Mikko</div>

</div>

<div class="btn">
Lisää ostoskoriin
</div>

</body>
</html>
