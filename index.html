<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nettihinta</title>

<style>
body{
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial,sans-serif;
background:white;
margin:0;
padding:20px;
}

.container{
max-width:420px;
margin:auto;
margin-top:40px;
}

.logo{
display:flex;
align-items:center;
gap:12px;
font-size:28px;
font-weight:800;
margin-bottom:30px;
}

.circle{
width:42px;
height:42px;
background:black;
color:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:900;
}

.title{
font-size:24px;
font-weight:700;
margin-bottom:20px;
}

.input{
width:100%;
padding:16px;
border-radius:12px;
border:1px solid #eee;
margin-bottom:12px;
font-size:16px;
}

.btn{
width:100%;
background:black;
color:white;
padding:16px;
border-radius:14px;
text-align:center;
font-weight:600;
margin-top:10px;
}

.avatar{
width:90px;
height:90px;
border-radius:50%;
background:#f2f2f2;
margin-bottom:20px;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
color:#666;
}
</style>

</head>
<body>

<div class="container">

<div class="logo">
<div class="circle">N</div>
Nettihinta
</div>

<div class="title">
Luo profiili
</div>

<div class="avatar">
Profiilikuva
</div>

<input class="input" placeholder="Nimi">

<input class="input" placeholder="Kaupunki">

<div class="btn">
Jatka
</div>

</div>

</body>
</html>
