<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nettihinta</title>

<style>
body{
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial,sans-serif;
background:white;
margin:0;
padding:20px;
}

.container{
max-width:420px;
margin:auto;
}

.logo{
display:flex;
align-items:center;
gap:12px;
font-size:26px;
font-weight:800;
margin-bottom:20px;
}

.circle{
width:40px;
height:40px;
background:black;
color:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:900;
}

.card{
border:1px solid #eee;
border-radius:16px;
padding:20px;
margin-bottom:12px;
}

.title{
font-weight:600;
color:#666;
}

.price{
font-size:28px;
font-weight:800;
margin-top:5px;
}

.primary{
background:black;
color:white;
padding:18px;
border-radius:16px;
text-align:center;
font-weight:700;
margin-top:20px;
}

.secondary{
text-align:center;
margin-top:12px;
color:#666;
font-weight:600;
}
</style>

</head>
<body>

<div class="container">

<div class="logo">
<div class="circle">N</div>
Nettihinta
</div>

<div class="card">
<div class="title">Arvioitu arvo</div>
<div class="price">120€</div>
</div>

<div class="card">
<div class="title">Nopea myynti</div>
<div class="price">95€</div>
</div>

<div class="card">
<div class="title">Paras hinta</div>
<div class="price">140€</div>
</div>

<div class="primary">
Julkaise myyntiin
</div>

<div class="secondary">
Muokkaa tietoja
</div>

</div>

</body>
</html>
