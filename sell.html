  <script>
document.addEventListener("DOMContentLoaded", function(){

// Beden -> Koko
document.querySelectorAll("*").forEach(el=>{
if(el.innerText === "Beden"){
el.innerText = "Koko";
}
});

// Dosyayı Seç -> Valitse kuva
document.querySelectorAll("input[type='file']").forEach(input=>{
input.previousSibling?.remove();

const label = document.createElement("div");
label.innerText = "Valitse kuva";
label.style.fontWeight="600";
label.style.marginBottom="6px";

input.parentNode.insertBefore(label, input);
});

});
</script>
  <script>
document.addEventListener("DOMContentLoaded", function(){

const fileInput = document.querySelector("input[type='file']");
if(!fileInput) return;

fileInput.style.display = "none";

const wrapper = document.createElement("div");
wrapper.style.border="1px solid #ddd";
wrapper.style.borderRadius="16px";
wrapper.style.padding="14px";
wrapper.style.background="white";

const button = document.createElement("button");
button.innerText = "Valitse kuva";
button.style.background="#eee";
button.style.border="none";
button.style.padding="8px 12px";
button.style.borderRadius="10px";
button.style.fontWeight="600";

const text = document.createElement("span");
text.innerText = " Ei valittua kuvaa";
text.style.marginLeft="10px";

button.onclick = () => fileInput.click();

fileInput.addEventListener("change", function(){
text.innerText = fileInput.files.length
? " " + fileInput.files[0].name
: " Ei valittua kuvaa";
});

wrapper.appendChild(button);
wrapper.appendChild(text);

fileInput.parentNode.insertBefore(wrapper, fileInput);
});
</script>
  <script>
document.addEventListener("DOMContentLoaded", function(){

const input = document.querySelector("input[type='file']");
if(!input) return;

const preview = document.createElement("img");
preview.style.width = "100%";
preview.style.borderRadius = "12px";
preview.style.marginTop = "10px";
preview.style.display = "none";

input.parentNode.appendChild(preview);

input.addEventListener("change", function(){

const file = input.files[0];
if(!file) return;

const reader = new FileReader();

reader.onload = function(e){
preview.src = e.target.result;
preview.style.display = "block";
};

reader.readAsDataURL(file);

});

});
</script>

  <script>
document.addEventListener("DOMContentLoaded", function(){

const input = document.querySelector("input[type='file']");
const button = document.querySelector("button");

if(!input || !button) return;

input.addEventListener("change", function(){

const file = input.files[0];
if(!file) return;

const reader = new FileReader();

reader.onload = function(e){

button.style.backgroundImage = `url(${e.target.result})`;
button.style.backgroundSize = "cover";
button.style.backgroundPosition = "center";
button.style.color = "white";
button.style.height = "160px";

button.innerText = "";

};

reader.readAsDataURL(file);

});

});
</script>
  <script>
document.addEventListener("DOMContentLoaded", function(){

const input = document.querySelector("input[type='file']");
if(!input) return;

input.setAttribute("multiple","true");

const gallery = document.createElement("div");
gallery.style.display="grid";
gallery.style.gridTemplateColumns="repeat(3,1fr)";
gallery.style.gap="8px";
gallery.style.marginTop="10px";

input.parentNode.appendChild(gallery);

input.addEventListener("change", function(){

gallery.innerHTML="";

[...input.files].forEach(file=>{

const reader = new FileReader();

reader.onload = function(e){

const img = document.createElement("img");
img.src = e.target.result;
img.style.width="100%";
img.style.borderRadius="10px";
img.style.height="100px";
img.style.objectFit="cover";

gallery.appendChild(img);

};

reader.readAsDataURL(file);

});

});

});
</script>
