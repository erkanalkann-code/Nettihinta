<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Myy tuote</title>

<style>
body{
font-family: Arial, sans-serif;
padding:16px;
background:#f5f5f5;
}

.card{
background:white;
padding:16px;
border-radius:16px;
}

input, select, button{
width:100%;
padding:14px;
margin-top:10px;
border-radius:12px;
border:1px solid #ddd;
font-size:16px;
}

button{
background:black;
color:white;
border:none;
font-weight:600;
}
</style>

</head>
<body>
<a href="index.html" style="
display:inline-block;
margin-bottom:10px;
font-weight:600;
text-decoration:none;
color:black;
">
← Takaisin
</a>
<h2>Ota kuva ja myy</h2>

<div class="card">

<input type="file">

<input type="text" placeholder="Tuotteen nimi">

<select>
<option>Kunto: Hyvä</option>
<option>Kunto: Ok</option>
<option>Kunto: Huono</option>
</select>

<button>Arvioi hinta</button>

</div>

</script>
  <script>
document.addEventListener("DOMContentLoaded", function() {
  document.querySelectorAll("input[type='file']").forEach(input => {
    input.setAttribute("accept", "image/*");
    input.setAttribute("capture", "environment");
  });
});
</script>
  <script>
document.addEventListener("DOMContentLoaded", function() {
  document.querySelectorAll("input[type='file']").forEach(input => {
    input.setAttribute("accept", "image/*");
    input.removeAttribute("capture");
  });
});
</script>
  <script>
document.addEventListener("DOMContentLoaded", function() {

const card = document.querySelector(".card");

const select = document.createElement("select");
select.id = "sizeSelect";

select.style.width = "100%";
select.style.padding = "14px";
select.style.marginTop = "10px";
select.style.borderRadius = "12px";
select.style.border = "1px solid #ddd";
select.style.fontSize = "16px";

select.innerHTML = `<option>Beden seç</option>`;

card.appendChild(select);

const nameInput = document.querySelector("input[type='text']");

nameInput.addEventListener("input", function(){

const value = this.value.toLowerCase();

if(value.includes("kenkä")){
select.innerHTML = `
<option>Koko</option>
<option>36</option>
<option>37</option>
<option>38</option>
<option>39</option>
<option>40</option>
<option>41</option>
<option>42</option>
<option>43</option>
<option>44</option>
<option>45</option>
`;
}

else if(value.includes("takki") || value.includes("paita")){
select.innerHTML = `
<option>Beden</option>
<option>XS</option>
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
<option>XXL</option>
`;
}

else{
select.innerHTML = `<option>Beden seç</option>`;
}

});

});
</script>
  <script>
document.addEventListener("DOMContentLoaded", function() {

const select = document.getElementById("sizeSelect");
const button = document.querySelector("button");

if(select && button){
button.parentNode.insertBefore(select, button);
}

});
</script>
  <script>
document.addEventListener("DOMContentLoaded", function() {

const nameInput = document.querySelector("input[type='text']");
const select = document.getElementById("sizeSelect");

nameInput.addEventListener("input", function(){

const value = this.value.toLowerCase();

if(value.includes("kenkä")){
select.innerHTML = `
<option>Koko</option>
<option>36</option>
<option>37</option>
<option>38</option>
<option>39</option>
<option>40</option>
<option>41</option>
<option>42</option>
<option>43</option>
<option>44</option>
<option>45</option>
`;
}

else if(
value.includes("takki") ||
value.includes("paita") ||
value.includes("farkut") ||
value.includes("housut") ||
value.includes("shirt") ||
value.includes("pants")
){
select.innerHTML = `
<option>Beden</option>
<option>XS</option>
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
<option>XXL</option>
`;
}

else{
select.innerHTML = `<option>Beden seç</option>`;
}

});

});
</script>
</body>
</html>
