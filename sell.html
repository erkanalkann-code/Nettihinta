<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Myy tuote</title>

<style>
body{
font-family: Arial, sans-serif;
padding:16px;
background:#f5f5f5;
}

.card{
background:white;
padding:16px;
border-radius:16px;
}

input, select, button{
width:100%;
padding:14px;
margin-top:10px;
border-radius:12px;
border:1px solid #ddd;
font-size:16px;
}

button{
background:black;
color:white;
border:none;
font-weight:600;
}
</style>

</head>
<body>

<h2>Ota kuva ja myy</h2>

<div class="card">

<input type="file">

<input type="text" placeholder="Tuotteen nimi">

<select>
<option>Kunto: Hyvä</option>
<option>Kunto: Ok</option>
<option>Kunto: Huono</option>
</select>

<button>Arvioi hinta</button>

</div>
<script>
document.addEventListener("DOMContentLoaded", function() {
  const back = document.createElement("button");
  back.innerText = "← Takaisin";
  
  back.style.position = "fixed";
  back.style.top = "16px";
  back.style.left = "16px";
  back.style.padding = "10px 14px";
  back.style.borderRadius = "12px";
  back.style.border = "none";
  back.style.background = "white";
  back.style.boxShadow = "0 2px 8px rgba(0,0,0,0.1)";
  back.style.fontWeight = "600";

  back.onclick = function() {
    window.location.href = "index.html";
  };

  document.body.appendChild(back);
});
</script>
</body>
</html>
