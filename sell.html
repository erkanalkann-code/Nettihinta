<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Myy tuote</title>

<style>
body{
font-family: Arial, sans-serif;
padding:16px;
background:#f5f5f5;
}

.card{
background:white;
padding:16px;
border-radius:16px;
}

input, select, button{
width:100%;
padding:14px;
margin-top:10px;
border-radius:12px;
border:1px solid #ddd;
font-size:16px;
}

button{
background:black;
color:white;
border:none;
font-weight:600;
}
</style>

</head>
<body>
<a href="index.html" style="
display:inline-block;
margin-bottom:10px;
font-weight:600;
text-decoration:none;
color:black;
">
← Takaisin
</a>
<h2>Ota kuva ja myy</h2>

<div class="card">

<input type="file">

<input type="text" placeholder="Tuotteen nimi">

<select>
<option>Kunto: Hyvä</option>
<option>Kunto: Ok</option>
<option>Kunto: Huono</option>
</select>

<button>Arvioi hinta</button>

</div>
<script>
document.addEventListener("DOMContentLoaded", function() {
  const back = document.createElement("button");
  back.innerText = "← Takaisin";
  
  back.style.position = "fixed";
  back.style.top = "16px";
  back.style.left = "16px";
  back.style.padding = "10px 14px";
  back.style.borderRadius = "12px";
  back.style.border = "none";
  back.style.background = "white";
  back.style.boxShadow = "0 2px 8px rgba(0,0,0,0.1)";
  back.style.fontWeight = "600";

  back.onclick = function() {
    window.location.href = "index.html";
  };

  document.body.appendChild(back);
});
</script>
  <script>
document.addEventListener("DOMContentLoaded", function() {

  const back = document.createElement("div");
  back.innerHTML = "←";
  
  back.style.position = "fixed";
  back.style.top = "env(safe-area-inset-top, 16px)";
  back.style.left = "12px";
  back.style.width = "40px";
  back.style.height = "40px";
  back.style.background = "white";
  back.style.borderRadius = "12px";
  back.style.display = "flex";
  back.style.alignItems = "center";
  back.style.justifyContent = "center";
  back.style.boxShadow = "0 4px 12px rgba(0,0,0,0.15)";
  back.style.zIndex = "9999";
  back.style.fontSize = "20px";
  back.style.fontWeight = "bold";

  back.onclick = function() {
    window.location.href = "index.html";
  };

  document.body.appendChild(back);

});
</script>
  <script>
document.addEventListener("DOMContentLoaded", function() {

  const header = document.createElement("div");
  header.style.display = "flex";
  header.style.alignItems = "center";
  header.style.gap = "10px";
  header.style.marginBottom = "10px";

  const back = document.createElement("button");
  back.innerText = "← Takaisin";
  back.style.border = "none";
  back.style.background = "none";
  back.style.fontSize = "16px";
  back.style.fontWeight = "600";

  back.onclick = function() {
    window.location.href = "index.html";
  };

  header.appendChild(back);

  document.body.insertBefore(header, document.body.firstChild);

});
</script>
  <script>
document.addEventListener("DOMContentLoaded", function() {

  const divs = document.querySelectorAll("body > div");

  divs.forEach(div => {
    if (div.innerText.includes("←") || div.style.position === "fixed") {
      div.style.display = "none";
    }
  });

});
</script>
  <script>
history.pushState({}, "", "");

window.onpopstate = function () {
  window.location.href = "index.html";
};
</script>
  <script>
document.addEventListener("DOMContentLoaded", function() {

  const all = document.querySelectorAll("body *");

  all.forEach(el => {
    const text = el.textContent.trim();
    const style = window.getComputedStyle(el);

    if (
      text === "←" ||
      text === "← Takaisin" ||
      (style.position === "fixed" && style.top === "0px")
    ) {
      el.style.display = "none";
    }
  });

});
</script><script>
document.addEventListener("DOMContentLoaded", function() {
  document.querySelectorAll("[style*='position: fixed']").forEach(el=>{
    if(el.innerText.includes("←")) el.remove();
  });
});
</script>
  <script>
window.addEventListener("load", function() {
  document.querySelectorAll("body > div").forEach(el => {
    if (el.innerText.includes("←")) {
      el.remove();
    }
  });
});
</script>
</body>
</html>
