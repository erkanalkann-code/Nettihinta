<!DOCTYPE html>
<html lang="fi">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tuote</title>

<style>
body{
font-family:-apple-system;
margin:0;
background:#f5f5f5;
}

.header{
position:fixed;
top:0;
left:0;
right:0;
background:white;
padding:16px;
font-weight:700;
font-size:18px;
border-bottom:1px solid #eee;
}

.image{
margin-top:60px;
width:100%;
height:420px;
background:#ddd;
}

.image img{
width:100%;
height:100%;
object-fit:cover;
}

.card{
background:white;
margin-top:-20px;
border-radius:20px 20px 0 0;
padding:20px;
}

.title{
font-size:22px;
font-weight:700;
}

.price{
font-size:20px;
font-weight:700;
margin-top:6px;
}

.desc{
color:#666;
margin-top:10px;
line-height:1.4;
}

.buy{
position:fixed;
bottom:20px;
left:16px;
right:16px;
background:black;
color:white;
padding:18px;
border-radius:16px;
text-align:center;
font-weight:700;
}
</style>
</head>

<body>

<div class="header">
Takaisin
</div>

<div class="image">
<img src="https://images.unsplash.com/photo-1520975922284-8b456906c813?q=80&w=1200">
</div>

<div class="card">

<div class="title">
Zara Takki
</div>

<div class="price">
18€
</div>

<div class="desc">
Hyväkuntoinen takki. Nopea toimitus. Myydään Nettihinta kautta.
</div>

</div>

<div class="buy">
Lisää koriin
</div>

</body>
</html>
